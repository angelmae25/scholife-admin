<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head th:replace="~{fragments/layout :: head('Dashboard')}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar('dashboard')}"></div>

<div class="main">
    <div class="topbar">
        <span class="topbar-title">Dashboard</span>
        <span style="font-size:.8rem;color:var(--text-muted)" th:text="'Welcome back, ' + ${currentAdmin?.fullName}"></span>
    </div>
    <div class="page-content">

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon crimson">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                </div>
                <div>
                    <div class="stat-label">Total Students</div>
                    <div class="stat-value" th:text="${totalStudents}">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <div>
                    <div class="stat-label">Active Students</div>
                    <div class="stat-value" th:text="${activeStudents}">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon gold">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </div>
                <div>
                    <div class="stat-label">Pending Approval</div>
                    <div class="stat-value" th:text="${pendingStudents}">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon crimson">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                </div>
                <div>
                    <div class="stat-label">Organizations</div>
                    <div class="stat-value" th:text="${totalOrgs}">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon blue">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                </div>
                <div>
                    <div class="stat-label">Admin Accounts</div>
                    <div class="stat-value" th:text="${totalAdmins}">0</div>
                </div>
            </div>
        </div>

        <!-- Quick actions -->
        <div class="card" style="margin-bottom:22px">
            <div class="card-header">
                <span class="card-title">Quick Actions</span>
            </div>
            <div class="card-body" style="display:flex;gap:12px;flex-wrap:wrap">
                <a th:href="@{/students?status=PENDING}" class="btn btn-accent">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
                    Review Pending Students
                </a>
                <a th:href="@{/organizations/new}" class="btn btn-primary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    New Organization
                </a>
                <a th:href="@{/admins/new}" sec:authorize="hasRole('SUPER_ADMIN')" class="btn btn-outline">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12" y2="16"/></svg>
                    Add Admin Account
                </a>
                <a th:href="@{/logs}" class="btn btn-outline">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    View Activity Logs
                </a>
            </div>
        </div>

        <!-- Recent activity -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">Recent Activity</span>
                <a th:href="@{/logs}" class="btn btn-outline btn-sm">View All</a>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>Action</th>
                        <th>Admin</th>
                        <th>Details</th>
                        <th>When</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="log : ${recentLogs}" th:if="${logStat.index < 10}">
                        <td><span class="action-badge" th:text="${log.category}"></span></td>
                        <td>
                            <div style="font-weight:600;font-size:.84rem" th:text="${log.admin?.fullName ?: '—'}"></div>
                            <div style="font-size:.72rem;color:var(--text-muted)" th:text="${log.admin?.role ?: ''}"></div>
                        </td>
                        <td style="max-width:300px;font-size:.82rem;color:var(--text-sub)" th:text="${log.event}"></td>
                        <td style="font-size:.78rem;color:var(--text-muted);white-space:nowrap"
                            th:text="${#temporals.format(log.createdAt,'MMM dd, yyyy HH:mm')}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(recentLogs)}">
                        <td colspan="4" style="text-align:center;color:var(--text-muted);padding:24px">No activity yet.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

</body>
</html>
