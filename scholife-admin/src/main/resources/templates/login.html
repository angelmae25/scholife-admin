<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign In — Scholife Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin=""/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --primary: #8B1A1A; --primary-dark: #6B0F0F;
            --accent: #E8A000; --accent-light: #FFB830;
            --bg: #F7F3F0; --card: #fff; --border: #EDD5D5;
            --text: #1A0A0A; --text-sub: #6B4040;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .bg-pattern {
            position: absolute; inset: 0; pointer-events: none;
            background-image:
                radial-gradient(circle at 20% 20%, rgba(139,26,26,.07) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(232,160,0,.07) 0%, transparent 50%);
        }
        .login-wrap {
            position: relative; z-index: 1;
            width: 100%; max-width: 420px;
            padding: 16px;
        }
        .login-logo {
            text-align: center; margin-bottom: 32px;
        }
        .login-logo .brand {
            font-family: 'DM Serif Display', serif;
            font-size: 2.8rem;
            color: var(--primary-dark);
            line-height: 1;
        }
        .login-logo .brand span { color: var(--accent); }
        .login-logo .tagline {
            font-size: .75rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: .12em;
            color: var(--text-sub); margin-top: 4px;
        }
        .login-card {
            background: var(--card);
            border-radius: 18px;
            padding: 36px 36px 32px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 40px rgba(139,26,26,.12);
        }
        .login-card h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.45rem; color: var(--primary-dark);
            margin-bottom: 6px;
        }
        .login-card .subtitle { font-size: .82rem; color: var(--text-sub); margin-bottom: 26px; }
        .form-group { margin-bottom: 16px; }
        .form-label {
            display: block; font-size: .75rem; font-weight: 700;
            color: var(--text-sub); text-transform: uppercase;
            letter-spacing: .06em; margin-bottom: 7px;
        }
        .form-control {
            width: 100%; padding: 11px 14px;
            border: 1.5px solid var(--border); border-radius: 9px;
            font-family: 'Plus Jakarta Sans', sans-serif; font-size: .9rem;
            color: var(--text); background: #fff;
            outline: none; transition: border-color .18s, box-shadow .18s;
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139,26,26,.08);
        }
        .btn-login {
            width: 100%; padding: 12px;
            background: var(--primary); color: #fff;
            border: none; border-radius: 9px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: .95rem; font-weight: 700;
            cursor: pointer; margin-top: 6px;
            transition: background .18s, box-shadow .18s;
            box-shadow: 0 3px 12px rgba(139,26,26,.28);
        }
        .btn-login:hover { background: var(--primary-dark); box-shadow: 0 5px 18px rgba(139,26,26,.38); }
        .alert {
            padding: 11px 14px; border-radius: 8px;
            font-size: .845rem; font-weight: 500; margin-bottom: 18px;
            border-left: 4px solid;
        }
        .alert-danger  { background: rgba(198,40,40,.08);  border-color: #C62828; color: #7F0000; }
        .alert-success { background: rgba(46,125,50,.08);  border-color: #2E7D32; color: #1B5E20; }
        .setup-link {
            text-align: center; margin-top: 18px;
            font-size: .8rem; color: var(--text-sub);
        }
        .setup-link a { color: var(--primary); font-weight: 700; }
    </style>
</head>
<body>
<div class="bg-pattern"></div>
<div class="login-wrap">
    <div class="login-logo">
        <div class="brand">Scho<span>O</span>life</div>
        <div class="tagline">Admin Dashboard</div>
    </div>

    <div class="login-card">
        <h2>Welcome back</h2>
        <p class="subtitle">Sign in to manage the Scholife platform.</p>

        <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

        <form method="post" th:action="@{/login}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="text" id="email" name="email" class="form-control"
                       placeholder="Enter your email" autocomplete="email" required/>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="Enter your password" autocomplete="current-password" required/>
            </div>
            <button type="submit" class="btn-login">Sign In</button>
        </form>
    </div>

    <div class="setup-link" th:if="${setupAvailable}">
        First time? <a th:href="@{/setup}">Create super admin account</a>
    </div>
</div>
</body>
</html>
