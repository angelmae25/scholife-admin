<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head th:replace="~{fragments/layout :: head('Student Detail')}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar('students')}"></div>

<div class="main">
    <div class="topbar">
        <span class="topbar-title">Student Detail</span>
        <a th:href="@{/students}" class="btn btn-outline btn-sm">← Back to Students</a>
    </div>
    <div class="page-content">

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>

        <div class="detail-grid">
            <!-- Left: profile card -->
            <div class="detail-card">
                <div class="card">
                    <div class="card-body" style="text-align:center;padding:28px 22px">
                        <div class="avatar-large" th:text="${student.firstName?.substring(0,1)}">A</div>
                        <div style="font-family:'DM Serif Display',serif;font-size:1.25rem;color:var(--primary-dark)"
                             th:text="${student.fullName}"></div>
                        <div style="font-size:.8rem;color:var(--text-muted);margin-top:3px"
                             th:text="${student.email}"></div>
                        <div style="margin-top:14px">
                            <span th:class="'badge badge-' + ${student.status.name().toLowerCase()}"
                                  th:text="${student.status}"></span>
                        </div>
                    </div>
                    <div class="card-body" style="padding-top:0">
                        <div class="info-row">
                            <span class="info-label">Student ID</span>
                            <span class="info-value" style="font-family:monospace" th:text="${student.studentId}"></span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Course</span>
                            <span class="info-value" th:text="${student.course ?: '—'}"></span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Year Level</span>
                            <span class="info-value" th:text="${student.yearLevel ?: '—'}"></span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Contact</span>
                            <span class="info-value" th:text="${student.contact ?: '—'}"></span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Points</span>
                            <span class="info-value" style="font-weight:800;color:var(--accent)"
                                  th:text="${student.points}"></span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Registered</span>
                            <span class="info-value"
                                  th:text="${student.createdAt != null ? #temporals.format(student.createdAt,'MMM dd, yyyy') : '—'}"></span>
                        </div>
                    </div>
                </div>

                <!-- Status actions -->
                <div class="card">
                    <div class="card-header"><span class="card-title">Account Status</span></div>
                    <div class="card-body" style="display:flex;flex-direction:column;gap:10px">
                        <form th:action="@{/students/{id}/status(id=${student.id})}" method="post"
                              th:if="${student.status.name() != 'ACTIVE'}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="status" value="ACTIVE"/>
                            <button type="submit" class="btn btn-success" style="width:100%">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                                Activate Account
                            </button>
                        </form>
                        <form th:action="@{/students/{id}/status(id=${student.id})}" method="post"
                              th:if="${student.status.name() != 'INACTIVE'}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="status" value="INACTIVE"/>
                            <button type="submit" class="btn btn-danger" style="width:100%"
                                    onclick="return confirm('Deactivate this student?')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                Deactivate Account
                            </button>
                        </form>
                        <form th:action="@{/students/{id}/status(id=${student.id})}" method="post"
                              th:if="${student.status.name() != 'PENDING'}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="status" value="PENDING"/>
                            <button type="submit" class="btn btn-outline" style="width:100%">Set to Pending</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Right: org roles -->
            <div>
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">Organization Roles</span>
                        <span style="font-size:.8rem;color:var(--text-muted)"
                              th:text="${orgRoles.size()} + ' role(s)'"></span>
                    </div>
                    <div class="card-body">
                        <div th:if="${#lists.isEmpty(assignments)}"
                             style="color:var(--text-muted);font-size:.875rem;padding:8px 0">
                            This student has no organization roles assigned.
                        </div>
                        <div class="roles-grid" th:if="${!#lists.isEmpty(assignments)}">
                            <div class="role-card" th:each="r : ${assignments}">
                                <div>
                                    <span class="role-badge" th:text="${r.role.roleName}"></span>
                                    <div class="role-name" style="margin-top:6px" th:text="${r.organization.name}"></div>
                                    <div class="role-student" th:if="${r.organization.acronym}"
                                         th:text="${r.organization.acronym}"></div>
                                </div>
                                <a th:href="@{/organizations/{id}(id=${r.organization.id})}"
                                   class="btn btn-outline btn-sm ms-auto">View Org</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
