<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} + ' — Scholife Admin'">Scholife Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin=""/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>

<!-- SIDEBAR -->
<aside th:fragment="sidebar(active)" class="sidebar">
    <div class="sidebar-logo">
        <span class="logo-scho">Scho</span><span class="logo-o">O</span><span class="logo-life">life</span>
        <small>Admin</small>
    </div>

    <nav class="sidebar-nav">
        <a th:href="@{/dashboard}"     th:classappend="${active=='dashboard'}     ? 'active' : ''">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            Dashboard
        </a>
        <a th:href="@{/students}"      th:classappend="${active=='students'}      ? 'active' : ''">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            Students
        </a>
        <a th:href="@{/organizations}" th:classappend="${active=='organizations'} ? 'active' : ''">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Organizations
        </a>
        <a th:href="@{/admins}" sec:authorize="hasRole('SUPER_ADMIN')"
           th:classappend="${active=='admins'} ? 'active' : ''">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            Admin Accounts
        </a>
        <a th:href="@{/logs}"          th:classappend="${active=='logs'}          ? 'active' : ''">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            Activity Logs
        </a>
    </nav>

    <div class="sidebar-footer">
        <div class="admin-chip">
            <div class="admin-avatar" th:text="${currentAdmin?.fullName?.substring(0,1) ?: 'A'}">A</div>
            <div class="admin-info">
                <span class="admin-name" th:text="${currentAdmin?.fullName ?: 'Admin'}">Admin</span>
                <span class="admin-role" th:text="${currentAdmin?.role ?: ''}">Role</span>
            </div>
        </div>
        <a th:href="@{/logout}" class="logout-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </a>
    </div>
</aside>

</html>
