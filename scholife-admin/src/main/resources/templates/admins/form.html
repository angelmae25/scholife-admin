<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Admin Form')}"></head>
<body>
<div th:replace="~{fragments/layout :: sidebar('admins')}"></div>
<div class="main">
    <div class="topbar">
        <span class="topbar-title" th:text="${admin.id != null} ? 'Edit Admin' : 'New Admin Account'"></span>
        <a th:href="@{/admins}" class="btn btn-outline btn-sm">← Back</a>
    </div>
    <div class="page-content">
        <div class="page-header">
            <div class="page-header-left">
                <h1 th:text="${admin.id != null} ? 'Edit Admin Account' : 'Create Admin Account'">Admin</h1>
                <p>Only Super Admins can create and manage admin accounts.</p>
            </div>
        </div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div class="card" style="max-width:600px">
            <div class="card-body">
                <form th:action="${admin.id != null} ? @{/admins/{id}/edit(id=${admin.id})} : @{/admins/new}"
                      method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">First Name *</label>
                            <input type="text" name="firstName" class="form-control"
                                   th:value="${admin.firstName}" placeholder="e.g. Maria" required/>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Last Name *</label>
                            <input type="text" name="lastName" class="form-control"
                                   th:value="${admin.lastName}" placeholder="e.g. Santos" required/>
                        </div>
                        <div class="form-group span-2">
                            <label class="form-label">Email * (used for login)</label>
                            <input type="email" name="email" class="form-control"
                                   th:value="${admin.email}" placeholder="admin@scholife.edu" required/>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Employee Number</label>
                            <input type="text" name="employeeNumber" class="form-control"
                                   th:value="${admin.employeeNumber}" placeholder="e.g. EMP-001"/>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Role *</label>
                            <select name="role" class="form-control" required>
                                <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"
                                        th:selected="${admin.role == r}"></option>
                            </select>
                        </div>
                        <div class="form-group span-2">
                            <label class="form-label"
                                   th:text="${admin.id != null} ? 'New Password (leave blank to keep current)' : 'Password *'">Password</label>
                            <input type="password" name="rawPassword" class="form-control"
                                   placeholder="Min. 8 characters"
                                   th:required="${admin.id == null}"/>
                        </div>
                    </div>
                    <div class="alert alert-info" style="margin-bottom:18px">
                        <strong>Roles:</strong>
                        <strong>SUPER_ADMIN</strong> — Full access including managing other admins &nbsp;|&nbsp;
                        <strong>ADMIN</strong> — Manage students, orgs &nbsp;|&nbsp;
                        <strong>MODERATOR</strong> — Limited access &nbsp;|&nbsp;
                        <strong>VIEWER</strong> — Read only
                    </div>
                    <div style="display:flex;gap:10px">
                        <button type="submit" class="btn btn-primary">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                            <span th:text="${admin.id != null} ? 'Save Changes' : 'Create Admin'">Save</span>
                        </button>
                        <a th:href="@{/admins}" class="btn btn-outline">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
