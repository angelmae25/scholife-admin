<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head th:replace="~{fragments/layout :: head('Organization Form')}"></head>

<body>

<div th:replace="~{fragments/layout :: sidebar('organizations')}"></div>

<div class="main">

    <div class="topbar">
        <span class="topbar-title"
              th:text="${org.id != null} ? 'Edit Organization' : 'New Organization'">
        </span>

        <a th:href="@{/organizations}" class="btn btn-outline btn-sm">
            ← Back
        </a>
    </div>

    <div class="page-content">

        <div class="page-header">
            <div class="page-header-left">
                <h1 th:text="${org.id != null} ? 'Edit Organization' : 'Create Organization'"></h1>
                <p>Upload logo and basic organization details.</p>
            </div>
        </div>

        <div class="card" style="max-width:700px">
            <div class="card-body">

                <!-- EDIT ORGANIZATION -->
                <form th:if="${org.id != null}"
                      th:action="@{/organizations/{id}/edit(id=${org.id})}"
                      method="post"
                      enctype="multipart/form-data">

                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}"/>

                    <div th:replace="~{organizations/form-fields :: fields}"></div>

                </form>


                <!-- CREATE ORGANIZATION -->
                <form th:unless="${org.id != null}"
                      th:action="@{/organizations/new}"
                      method="post"
                      enctype="multipart/form-data">

                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}"/>

                    <div class="form-grid">

                        <!-- Organization Name -->
                        <div class="form-group span-2">
                            <label class="form-label">Organization Name *</label>

                            <input type="text"
                                   name="name"
                                   class="form-control"
                                   th:value="${org.name}"
                                   placeholder="Computer Science Society"
                                   required>
                        </div>

                        <!-- Acronym -->
                        <div class="form-group">
                            <label class="form-label">Acronym</label>

                            <input type="text"
                                   name="acronym"
                                   class="form-control"
                                   th:value="${org.acronym}"
                                   placeholder="CSS">
                        </div>

                        <!-- Type -->
                        <div class="form-group">
                            <label class="form-label">Type</label>

                            <select name="type" class="form-control">

                                <option value="">Select type</option>

                                <option value="Academic" th:selected="${org.type == 'Academic'}">Academic</option>
                                <option value="Cultural" th:selected="${org.type == 'Cultural'}">Cultural</option>
                                <option value="Sports" th:selected="${org.type == 'Sports'}">Sports</option>
                                <option value="Religious" th:selected="${org.type == 'Religious'}">Religious</option>
                                <option value="Service" th:selected="${org.type == 'Service'}">Service</option>
                                <option value="Political" th:selected="${org.type == 'Political'}">Political</option>
                                <option value="General" th:selected="${org.type == 'General'}">General</option>

                            </select>
                        </div>

                        <!-- Description -->
                        <div class="form-group span-2">

                            <label class="form-label">Description</label>

                            <textarea name="description"
                                      class="form-control"
                                      rows="4"
                                      placeholder="Brief description of the organization"
                                      th:text="${org.description}"></textarea>

                        </div>

                        <!-- Logo -->
                        <div class="form-group span-2">

                            <label class="form-label">Organization Logo</label>

                            <input type="file"
                                   name="logoFile"
                                   class="form-control">

                            <small style="color:var(--text-muted)">
                                JPG / PNG recommended
                            </small>

                        </div>

                    </div>

                    <div style="display:flex;gap:10px;margin-top:16px">

                        <button type="submit" class="btn btn-primary">

                            <svg viewBox="0 0 24 24"
                                 fill="none"
                                 stroke="currentColor"
                                 stroke-width="2">

                                <polyline points="20 6 9 17 4 12"></polyline>

                            </svg>

                            <span>Create Organization</span>

                        </button>

                        <a th:href="@{/organizations}"
                           class="btn btn-outline">
                            Cancel
                        </a>

                    </div>

                </form>

            </div>
        </div>

    </div>

</div>

</body>
</html>
