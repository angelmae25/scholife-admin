<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Organization Form')}"></head>
<body>
<div th:replace="~{fragments/layout :: sidebar('organizations')}"></div>
<div class="main">
    <div class="topbar">
        <span class="topbar-title" th:text="${org.id != null} ? 'Edit Organization' : 'New Organization'"></span>
        <a th:href="@{/organizations}" class="btn btn-outline btn-sm">← Back</a>
    </div>
    <div class="page-content">
        <div class="page-header">
            <div class="page-header-left">
                <h1 th:text="${org.id != null} ? 'Edit Organization' : 'Create Organization'">Organization</h1>
                <p>Officers can be appointed after saving.</p>
            </div>
        </div>
        <div class="card" style="max-width:700px">
            <div class="card-body">
                <form th:action="${org.id != null} ? @{/organizations/{id}/edit(id=${org.id})} : @{/organizations/new}"
                      method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="form-grid">
                        <div class="form-group span-2">
                            <label class="form-label">Organization Name *</label>
                            <input type="text" name="name" class="form-control"
                                   th:value="${org.name}" placeholder="e.g. Computer Science Society" required/>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Acronym</label>
                            <input type="text" name="acronym" class="form-control"
                                   th:value="${org.acronym}" placeholder="e.g. CSS" maxlength="20"/>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Type</label>
                            <select name="type" class="form-control">
                                <option value="">Select type…</option>
                                <option value="Academic"  th:selected="${org.type == 'Academic'}">Academic</option>
                                <option value="Cultural"  th:selected="${org.type == 'Cultural'}">Cultural</option>
                                <option value="Sports"    th:selected="${org.type == 'Sports'}">Sports</option>
                                <option value="Religious" th:selected="${org.type == 'Religious'}">Religious</option>
                                <option value="Service"   th:selected="${org.type == 'Service'}">Service</option>
                                <option value="Political" th:selected="${org.type == 'Political'}">Political</option>
                                <option value="General"   th:selected="${org.type == 'General'}">General</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Adviser</label>
                            <input type="text" name="adviser" class="form-control"
                                   th:value="${org.adviser}" placeholder="e.g. Dr. Juan dela Cruz"/>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Year Founded</label>
                            <input type="number" name="yearFounded" class="form-control"
                                   th:value="${org.yearFounded}" placeholder="e.g. 2010" min="1900" max="2099"/>
                        </div>
                        <div class="form-group span-2">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="4"
                                      placeholder="Brief description of the organization…"
                                      th:text="${org.description}"></textarea>
                        </div>
                    </div>
                    <div style="display:flex;gap:10px;margin-top:6px">
                        <button type="submit" class="btn btn-primary">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                            <span th:text="${org.id != null} ? 'Save Changes' : 'Create Organization'">Save</span>
                        </button>
                        <a th:href="${org.id != null} ? @{/organizations/{id}(id=${org.id})} : @{/organizations}"
                           class="btn btn-outline">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
