<div class="page-header">
    <div class="page-header-left">

        <div style="display:flex;align-items:center;gap:14px">

            <!-- ORGANIZATION LOGO -->
            <img th:if="${org.logo}"
                 th:src="@{'/uploads/org-logos/' + ${org.logo}}"
                 style="width:64px;height:64px;border-radius:12px;object-fit:cover"/>

            <div th:if="${org.logo == null}"
                 style="width:64px;height:64px;border-radius:12px;
                        background:var(--primary);color:#fff;
                        display:flex;align-items:center;justify-content:center;
                        font-size:1.2rem;font-weight:700">
                <span th:text="${org.name.substring(0,1)}">O</span>
            </div>

            <div>

                <h1 th:text="${org.name}">Organization</h1>

                <p>
                    <span th:if="${org.acronym}"
                          th:text="${org.acronym} + ' · '"></span>

                    <span th:text="${org.type ?: 'General'}"></span>

                    &nbsp;·&nbsp;

                    <span th:class="'badge badge-' + ${org.status.name().toLowerCase()}"
                          th:text="${org.status}">
                    </span>
                </p>

            </div>

        </div>

    </div>

    <div style="display:flex;gap:10px">

        <a th:href="@{/organizations/{id}/edit(id=${org.id})}"
           class="btn btn-outline">
            Edit
        </a>

        <a th:href="@{/organizations}"
           class="btn btn-outline">
            ← All Organizations
        </a>

    </div>
</div>
