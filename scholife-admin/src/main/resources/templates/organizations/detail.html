<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head th:replace="~{fragments/layout :: head('Organization Detail')}"></head>

<body>

<div th:replace="~{fragments/layout :: sidebar('organizations')}"></div>

<!-- =========================
     APPOINT OFFICER MODAL
========================= -->
<div class="modal-overlay" id="appointModal">
    <div class="modal-box">

        <div class="modal-title">Appoint Officer</div>

        <form th:action="@{/organizations/{id}/appoint(id=${org.id})}" method="post">

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <!-- Student search + select -->
            <div class="form-group">
                <label class="form-label">Student *</label>
                <input type="text" id="studentSearch" class="form-control"
                       placeholder="Type name or ID to filter…"
                       oninput="filterStudents(this.value)"
                       style="margin-bottom:6px" />
                <select name="studentId" id="studentSelect" class="form-control" required>
                    <option value="">Select active student…</option>
                    <option th:each="s : ${students}"
                            th:value="${s.id}"
                            th:text="${s.fullName} + ' (' + ${s.studentId} + ')'">
                    </option>
                </select>
            </div>

            <!-- Role select + add custom role -->
            <div class="form-group">
                <label class="form-label">Officer Role *</label>
                <div style="display:flex;gap:8px;align-items:center">
                    <select name="roleId" id="roleSelect" class="form-control"
                            required style="flex:1"
                            onchange="toggleCustomRole(this.value)">
                        <option value="">Select role…</option>
                        <option th:each="r : ${roles}"
                                th:value="${r.id}"
                                th:text="${r.roleName}">
                        </option>
                        <option value="__custom__">+ Add new role…</option>
                    </select>
                </div>
                <!-- Custom role input, hidden by default -->
                <div id="customRoleDiv" style="display:none;margin-top:8px">
                    <input type="text" name="customRoleName" id="customRoleName"
                           class="form-control"
                           placeholder="e.g. Public Relations Officer"
                           maxlength="60" />
                    <div style="font-size:.75rem;color:var(--text-muted);margin-top:4px">
                        This role will be saved and available for future appointments.
                    </div>
                </div>
            </div>

            <p style="font-size:.78rem;color:var(--text-muted);margin-bottom:14px">
                ⚠️ If this role is already filled, the previous officer will be replaced.
            </p>

            <div style="display:flex;gap:10px;justify-content:flex-end">
                <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">Appoint Officer</button>
            </div>

        </form>
    </div>
</div>


<!-- =========================
     MAIN CONTENT
========================= -->
<div class="main">

    <div class="topbar">

        <span class="topbar-title"
              th:text="${org.name}">
            Organization
        </span>

        <a th:href="@{/organizations}"
           class="btn btn-outline btn-sm">
            ← All Organizations
        </a>

    </div>


    <div class="page-content">

        <!-- Alerts -->
        <div th:if="${success}"
             class="alert alert-success"
             th:text="${success}"></div>

        <div th:if="${error}"
             class="alert alert-danger"
             th:text="${error}"></div>


        <!-- =========================
             PAGE HEADER
        ========================= -->
        <div class="page-header" style="display: flex; align-items: center; justify-content: space-between;">

            <div class="page-header-left">
                <h1 th:text="${org.name}"></h1>

                <div style="display: flex; align-items: center; gap: 8px; margin-top: 4px;">

            <span th:if="${org.acronym}"
                  style="font-size: 0.9rem; color: var(--text-muted);"
                  th:text="${org.acronym} + ' · '"></span>

                    <span style="font-size: 0.9rem; color: var(--text-muted);"
                          th:text="${org.type ?: 'General'}"></span>

                    <span th:class="'badge badge-' + ${org.status.name().toLowerCase()}"
                          th:text="${org.status}"
                          style="width: 85px;
                         text-align: center;
                         flex-shrink: 0;
                         display: inline-block;
                         line-height: 1.2;">
            </span>

                </div>
            </div>

            <div style="display:flex; gap:10px; align-items: center;">
                <a th:href="@{/organizations/{id}/edit(id=${org.id})}"
                   class="btn btn-outline">
                    Edit
                </a>

                <form th:action="@{/organizations/{id}/toggle-status(id=${org.id})}"
                      method="post"
                      style="margin:0">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit"
                            class="btn"
                            th:classappend="${org.status.name()=='ACTIVE'} ? 'btn-danger' : 'btn-success'"
                            th:text="${org.status.name()=='ACTIVE'} ? 'Deactivate' : 'Activate'"
                            onclick="return confirm('Toggle this organization status?')">
                        Toggle
                    </button>
                </form>
            </div>

        </div>

        <!-- =========================
     ORGANIZATION INFO
========================= -->
        <div class="card" style="margin-bottom:20px">

            <div class="card-body"
                 style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px">

                <div>
                    <div class="form-label">Adviser</div>
                    <div th:text="${org.adviser ?: '—'}"></div>
                </div>

                <div>
                    <div class="form-label">Year Founded</div>
                    <div th:text="${org.yearFounded ?: '—'}"></div>
                </div>

                <div>
                    <div class="form-label">Description</div>
                    <div style="font-size:.84rem;color:var(--text-sub)"
                         th:text="${org.description ?: '—'}"></div>
                </div>

            </div>

        </div>

        <!-- =========================
             OFFICERS SECTION
        ========================= -->
        <div class="card">

            <div class="card-header">

                <span class="card-title">
                    Officer Appointments
                </span>

                <button class="btn btn-primary btn-sm"
                        onclick="openModal()">

                    + Appoint Officer

                </button>

            </div>


            <div class="card-body">

                <!-- =========================
                     QUICK ASSIGN FORM
                ========================= -->


                <!-- =========================
                     OFFICER CARDS
                ========================= -->
                <div th:if="${#lists.isEmpty(assignments)}"
                     style="color:var(--text-muted);font-size:.875rem;padding:8px 0">

                    No officers appointed yet.

                </div>


                <div class="roles-grid"
                     th:if="${!#lists.isEmpty(assignments)}">

                    <div class="role-card"
                         th:each="a : ${assignments}">

                        <div style="flex:1;min-width:0">

                            <span class="role-badge"
                                  th:text="${a.role.roleName}">
                            </span>

                            <div class="role-name"
                                 style="margin-top:7px"
                                 th:text="${a.student.fullName}">
                            </div>

                            <div class="role-student"
                                 th:text="${a.student.studentId}">
                            </div>

                            <div class="role-student"
                                 th:text="${a.student.course}">
                            </div>

                        </div>

                        <form th:action="@{/organizations/assignments/{aid}/remove(aid=${a.id})}"
                              method="post">

                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}"/>

                            <input type="hidden"
                                   name="orgId"
                                   th:value="${org.id}"/>

                            <button type="submit"
                                    class="btn btn-danger btn-sm"
                                    onclick="return confirm('Remove this officer?')">

                                Remove

                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>


<script th:inline="none">
    function openModal() {
        document.getElementById('appointModal').classList.add('open');
    }
    function closeModal() {
        document.getElementById('appointModal').classList.remove('open');
    }
    document.getElementById('appointModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    // Filter student dropdown by name or ID
    function filterStudents(query) {
        const select = document.getElementById('studentSelect');
        const q = query.toLowerCase();
        Array.from(select.options).forEach(opt => {
            if (opt.value === '') return; // keep placeholder
            opt.hidden = q.length > 0 && !opt.text.toLowerCase().includes(q);
        });
        // Reset selection if current option is now hidden
        if (select.selectedOptions[0]?.hidden) select.value = '';
    }

    // Show/hide custom role input
    function toggleCustomRole(val) {
        const div   = document.getElementById('customRoleDiv');
        const input = document.getElementById('customRoleName');
        const sel   = document.getElementById('roleSelect');
        if (val === '__custom__') {
            div.style.display = 'block';
            input.required = true;
            sel.required = false;   // custom name is used instead
        } else {
            div.style.display = 'none';
            input.required = false;
            sel.required = true;
        }
    }
</script>


</body>
</html>
